# ---------- FONT ----------
font_family      JetBrains Mono Nerd Font
font_size        13.5

# ---------- BACKGROUND / OPACITY ----------
background_opacity 0.85

# ---------- COLORS (Cosmic theme) ----------
foreground #C5C8C6
background #1A1B2F

cursor #82AAFF
cursor_text_color #1A1B2F

selection_background #8ABEB7
selection_foreground #1A1B2F

# ANSI COLORS
color0  #1A1B2F
color1  #F07178
color2  #C3E88D
color3  #FFCB6B
color4  #82AAFF
color5  #C792EA
color6  #89DDFF
color7  #FFFFFF

# BRIGHT COLORS
color8  #5C5F77
color9  #F07178
color10 #C3E88D
color11 #FFCB6B
color12 #82AAFF
color13 #C792EA
color14 #89DDFF
color15 #FFFFFF

# ---------- SCROLLBACK ----------
scrollback_lines 10000

# ---------- CURSOR ----------
cursor_blink_interval 0

# ---------- WINDOW ----------
hide_window_decorations no

shell /usr/bin/fish
